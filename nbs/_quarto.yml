project:
  type: website
  output-dir: _docs
  resources:
    - images/blog/**
  render:
    - "*.qmd"
    - "*.ipynb"
    - "!00_core.ipynb"
    - "blog/*.qmd"
    - "blog/*.ipynb"
    - "!blog/*colab*.ipynb"

website:
  title: "Sangyu Xu 徐桑榆"
  description: "Computational Behaviour Scientist"
  site-url: "https://xusangyu.com"
  repo-url: "https://github.com/sangyu/portfolio"
  repo-branch: main
  favicon: "🪰"
  open-graph: true
  twitter-card: true
  navbar:
    pinned: true
    background: white
    left:
      - href: index.ipynb
        text: Home
      - href: research.qmd
        text: Research
      - href: neuroscience.qmd
        text: Neuroscience
      - href: statistics.qmd
        text: Open Source Tools
      - href: genetic-tools.qmd
        text: Genetic Tools
      - text: Demos
        menu:
          - text: DABEST 2.0
            href: dabest_demo.ipynb
          - text: Whorlmap
            href: https://sangyu.github.io/whorlmap-paper/
          - text: Rugprint
            href: https://sangyu.github.io/rugprint/
          - text: MODA
            href: https://acclab.github.io/moda/
          - text: ESPLoCo
            href: https://sangyu.github.io/esploco/Tutorials/01%20Tutorial.html
      - href: blog/index.qmd
        text: Writing
      - href: art.qmd
        text: Art & Music
      - href: cv.qmd
        text: CV
    right:
      - icon: github
        href: https://github.com/sangyu
        aria-label: GitHub
      - text: xusangyu.com
        href: https://xusangyu.com
  sidebar: false
  page-footer:
    center: "Built with [Quarto](https://quarto.org)"
    background: light

format:
  html:
    theme: cosmo
    css: styles.css
    toc: false
    page-layout: full
    lightbox: true
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Caveat:wght@400;700&family=Inter:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
        <!-- Privacy-friendly analytics by Plausible -->
        <script async src="https://plausible.io/js/pa-1qkUnQ7mwTijcLlWfCLUi.js"></script>
        <script>
          window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
          plausible.init()
        </script>
execute:
  freeze: auto

jupyter: dabestnmethrevision
